services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: nextup
      POSTGRES_PASSWORD: nextup
      POSTGRES_DB: nextup
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data

  # one-shot: create the bucket + allow the frontend origin to PUT
  createbucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minio minio12345) do echo waiting for minio; sleep 1; done;
      /usr/bin/mc mb -p local/nextup;
      /usr/bin/mc anonymous set download local/nextup;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
